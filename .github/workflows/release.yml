name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          
          VERSION_NUM="${VERSION#v}"
          mkdir -p dist
          
          bun install --cwd bridge --frozen-lockfile
          
          # Build for multiple platforms
          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
          )
          
          for platform in "${platforms[@]}"; do
            GOOS="${platform%%/*}"
            GOARCH="${platform##*/}"
            output="dist/substrate_${VERSION_NUM}_${GOOS}_${GOARCH}"
            package_dir="dist/package_${VERSION_NUM}_${GOOS}_${GOARCH}"
            
            case "$platform" in
              "darwin/amd64")
                bridge_target="bun-darwin-x64-baseline"
                native_addon="pi_natives.darwin-x64-baseline.node"
                ;;
              "darwin/arm64")
                bridge_target="bun-darwin-arm64"
                native_addon="pi_natives.darwin-arm64.node"
                ;;
              "linux/amd64")
                bridge_target="bun-linux-x64-baseline"
                native_addon="pi_natives.linux-x64-baseline.node"
                ;;
              "linux/arm64")
                bridge_target="bun-linux-arm64"
                native_addon="pi_natives.linux-arm64.node"
                ;;
              *)
                echo "unsupported platform: $platform"
                exit 1
                ;;
            esac
            
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags="-s -w -X main.Version=${VERSION_NUM}" \
              -o "$output" \
              ./cmd/substrate
            
            rm -rf "$package_dir"
            mkdir -p "$package_dir/bridge"
            mv "$output" "$package_dir/substrate"
            bun build bridge/omp-bridge.ts \
              --compile \
              --target "$bridge_target" \
              --outfile "$package_dir/bridge/omp-bridge"
            cp "bridge/node_modules/@oh-my-pi/pi-natives/native/$native_addon" "$package_dir/bridge/$native_addon"
            tar -C "$package_dir" -czf "dist/substrate_${VERSION_NUM}_${GOOS}_${GOARCH}.tar.gz" .
            rm -rf "$package_dir"
          done
          
          # Generate checksums
          cd dist
          sha256sum *.tar.gz > checksums.txt
          
          echo "Release assets:"
          ls -la

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          
          VERSION_NUM="${VERSION#v}"
          
          # Extract checksums for each platform
          SHA256_DARWIN_ARM64=$(awk -v asset="substrate_${VERSION_NUM}_darwin_arm64.tar.gz" '$2 == asset {print $1}' dist/checksums.txt)
          SHA256_DARWIN_AMD64=$(awk -v asset="substrate_${VERSION_NUM}_darwin_amd64.tar.gz" '$2 == asset {print $1}' dist/checksums.txt)
          SHA256_LINUX_ARM64=$(awk -v asset="substrate_${VERSION_NUM}_linux_arm64.tar.gz" '$2 == asset {print $1}' dist/checksums.txt)
          SHA256_LINUX_AMD64=$(awk -v asset="substrate_${VERSION_NUM}_linux_amd64.tar.gz" '$2 == asset {print $1}' dist/checksums.txt)
          
          # Base URLs
          BASE_URL="https://github.com/beeemT/substrate/releases/download/${VERSION}"
          
          cat > /tmp/substrate.rb <<FORMULA
          class Substrate < Formula
            desc "AI-powered work item orchestration for multi-repo development"
            homepage "https://github.com/beeemT/substrate"
            license "MIT"
            version "${VERSION_NUM}"

            depends_on "beeemT/tap/git-work"
            # Optional CLIs intentionally not hard dependencies:
            # - gh: only needed for GitHub CLI token fallback and harness-driven GitHub login
            # - glab: only needed for GitLab MR lifecycle automation

            on_macos do
              on_arm do
                url "${BASE_URL}/substrate_${VERSION_NUM}_darwin_arm64.tar.gz"
                sha256 "${SHA256_DARWIN_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/substrate_${VERSION_NUM}_darwin_amd64.tar.gz"
                sha256 "${SHA256_DARWIN_AMD64}"
              end
            end
            on_linux do
              depends_on "bubblewrap"
              on_arm do
                url "${BASE_URL}/substrate_${VERSION_NUM}_linux_arm64.tar.gz"
                sha256 "${SHA256_LINUX_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/substrate_${VERSION_NUM}_linux_amd64.tar.gz"
                sha256 "${SHA256_LINUX_AMD64}"
              end
            end

            def install
              bin.install "substrate"
              pkgshare.install "bridge"
            end

            test do
              assert_match "substrate", shell_output("#{bin}/substrate --help 2>&1", 0).downcase
              assert_path_exists pkgshare/"bridge/omp-bridge"
              assert_match "session_ready", pipe_output("#{pkgshare}/bridge/omp-bridge", '{"type":"abort"}\n', 0)
            end
          end
          FORMULA
          
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/beeemT/tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/substrate.rb /tmp/tap/Formula/substrate.rb
          
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/substrate.rb
          git commit -m "substrate ${VERSION}"
          git push
